version: '3.9'

services:

  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: polivisitas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: polivisitas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polivisitas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin ──────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: polivisitas-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@polivisitas.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ─── MinIO (simulador AWS S3) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: polivisitas-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO Setup (cria bucket automaticamente) ────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: polivisitas-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/polivisitas-imagens;
        mc anonymous set download local/polivisitas-imagens;
        echo 'Bucket polivisitas-imagens criado!';
        exit 0;
      "

  # ─── API Spring Boot ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polivisitas-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/polivisitas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      AWS_S3_BUCKET_NAME: polivisitas-imagens
      AWS_S3_REGION: us-east-1
      AWS_S3_ACCESS_KEY: minioadmin
      AWS_S3_SECRET_KEY: minioadmin123
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_PUBLIC_URL: http://localhost:9000
      AWS_S3_PATH_STYLE_ACCESS: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  postgres_data:
  pgadmin_data:
  minio_data:
