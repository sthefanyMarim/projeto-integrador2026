spring.application.name=polivisitas
spring.profiles.active=dev

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Cache
spring.cache.type=redis

# Jackson
spring.jackson.default-property-inclusion=non_null

# JWT
jwt.secret=p0l1v1s1t4s-s3cr3t-k3y-ufsm-c0l3g10-p0l1t3cn1c0-s1st3m4s-p4r4-1nt3rn3t
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Server
server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never

# Bootstrap admin
app.bootstrap.admin.enabled=true
app.bootstrap.admin.nome=Admin UFSM
app.bootstrap.admin.matricula=999999999
app.bootstrap.admin.email=admin@polivisitas.ufsm.br
app.bootstrap.admin.senha=admin123
